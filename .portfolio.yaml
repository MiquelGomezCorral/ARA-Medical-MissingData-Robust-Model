title:
  en: "Missing-Data-Robust Medical Imaging Model: SSL Pretraining + Survival Prediction"
  es: "Modelo Robusto ante Datos Faltantes para Imagen Médica: SSL + Supervivencia"
finished: finished
descriptionShort:
  en: "3-stage pipeline: self-supervised pretraining on BraTS (brain tumor segmentation), survival prediction training on UPenn-GBM (glioblastoma), and testing. Uses deep learning architecture with YAML config, editable install, and multi-GPU support via PyTorch Accelerator."
  es: "Pipeline de 3 etapas: pre-entrenamiento self-supervised sobre BraTS (segmentación tumoral cerebral), entrenamiento de predicción de supervivencia sobre UPenn-GBM (glioblastoma), y evaluación. Usa arquitectura de deep learning con configuración YAML, edición instalable, y soporte multi-GPU vía PyTorch Accelerator."
descriptionLong:
  en: |
    Medical model for robust survival prediction in glioblastoma. Stage 1: self-supervised pretraining (SSL) on the BraTS brain tumor segmentation dataset, learning generic 3D image representations. Stage 2: fine-tuning the pretrained encoder for survival time prediction using the UPenn-GBM dataset with multimodal clinical and imaging data (NIfTI). Stage 3: evaluation on predefined data partitions. Architecture uses PyTorch with automatic GPU acceleration, YAML-based configuration via dataclass, early stopping, automatic checkpointing, and deterministic seeding. Designed to handle missing data in real clinical environments.
  es: |
    Modelo médico para predicción robusta de supervivencia en glioblastoma. Primera etapa: pre-entrenamiento auto-supervisado (SSL) sobre el dataset BraTS de segmentación de tumores cerebrales, aprendiendo representaciones genéricas de imagen 3D. Segunda etapa: fine-tuning del encoder pre-entrenado para predecir tiempo de supervivencia usando el dataset UPenn-GBM con datos clínicos y de imagen multimodal (NIfTI). Tercera etapa: evaluación sobre particiones predefinidas. La arquitectura usa PyTorch con aceleración automática GPU, sistema de configuración YAML con dataclass, early stopping, checkpointing automático, y seeding determinista. Orientado a manejar datos faltantes (missing data) en entornos clínicos reales.
